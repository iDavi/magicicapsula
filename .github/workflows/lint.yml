name: lint

# keeps the codebase to a single, enforced style on every push and PR
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: install ruff
        run: python -m pip install --upgrade "ruff>=0.15"

      - name: lint
        run: ruff check --output-format=github .

      - name: format
        run: ruff format --check --diff .
